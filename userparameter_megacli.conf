# MegaCLI RAID Monitoring UserParameters
# Install to: /etc/zabbix/zabbix_agentd.d/userparameter_megacli.conf
#         or: /etc/zabbix/zabbix_agent2.d/userparameter_megacli.conf

# Discovery
UserParameter=megacli.discover[*],/usr/local/bin/zabbix_megacli.sh discover $1
# Adapter metrics
UserParameter=megacli.adapter[*],/usr/local/bin/zabbix_megacli.sh get adapter $1 $2
# Virtual drive metrics
UserParameter=megacli.vd[*],/usr/local/bin/zabbix_megacli.sh get vd $1 $2 $3
# Physical disk metrics
UserParameter=megacli.pd[*],/usr/local/bin/zabbix_megacli.sh get pd $1 $2 $3
# BBU metrics
UserParameter=megacli.bbu[*],/usr/local/bin/zabbix_megacli.sh get bbu $1 $2
